<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Onion Trade Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#f0ebe3;min-height:100vh;color:#1a2e1a}
h1,h2,h3{font-family:'Libre Baskerville',serif}
input,select,button{font-family:'DM Sans',sans-serif}

/* ─ Header ─ */
.app-header{background:#1a3a1a;color:#f5ede0;padding:1.1rem 1.75rem;display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap}
.app-header-left{display:flex;align-items:center;gap:.85rem}
.logo{width:42px;height:42px;background:#c9a84c;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Libre Baskerville',serif;font-size:1.1rem;color:#1a3a1a;font-weight:700;flex-shrink:0}
.app-header h1{font-size:1.2rem;font-weight:700;letter-spacing:-.02em;color:#f5ede0}
.app-header p{font-size:.74rem;color:#a8c5a0;margin-top:2px}
.hist-btn{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);color:#f5ede0;padding:.45rem .9rem;border-radius:8px;cursor:pointer;font-size:.8rem;font-weight:600;display:flex;align-items:center;gap:5px;white-space:nowrap}
.hist-btn:hover{background:rgba(255,255,255,.2)}
.hist-badge{background:#c9a84c;color:#1a3a1a;border-radius:10px;padding:1px 7px;font-size:.68rem;font-weight:700}

/* ─ Main Tabs ─ */
.main-tabs{background:#112a11;display:flex;border-bottom:2px solid #c9a84c;overflow-x:auto}
.main-tab{flex:1;min-width:100px;padding:.75rem .5rem;border:none;background:transparent;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.82rem;font-weight:500;color:#a8c5a0;display:flex;flex-direction:column;align-items:center;gap:3px;transition:all .15s;border-bottom:3px solid transparent;margin-bottom:-2px;white-space:nowrap}
.main-tab:hover{color:#f5ede0;background:rgba(255,255,255,.05)}
.main-tab.active{color:#c9a84c;border-bottom-color:#c9a84c;background:rgba(201,168,76,.08)}
.tab-icon{font-size:1rem}
.tab-badge{font-size:.67rem;font-family:'DM Mono',monospace;padding:2px 6px;border-radius:10px;background:rgba(255,255,255,.1);color:#a8c5a0;font-weight:500}
.main-tab.active .tab-badge{background:rgba(201,168,76,.2);color:#c9a84c}
.tab-badge-red{background:rgba(184,32,32,.2)!important;color:#f09595!important}
.tab-badge-green{background:rgba(26,122,26,.25)!important;color:#9fe1cb!important}

/* ─ Layout ─ */
.container{max-width:800px;margin:0 auto;padding:1.75rem 1.25rem}
.card{background:#fff;border-radius:14px;border:1.5px solid #d4c9b8;padding:1.5rem;margin-bottom:1.1rem}
.card h2{font-size:1rem;color:#1a3a1a;margin-bottom:1.1rem;padding-bottom:.65rem;border-bottom:1.5px solid #f0ebe3}

/* ─ Steps ─ */
.steps{display:flex;margin-bottom:1.25rem;background:#fff;border-radius:12px;overflow:hidden;border:1.5px solid #d4c9b8}
.step-btn{flex:1;padding:.7rem .5rem;border:none;background:transparent;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.78rem;font-weight:500;color:#7a6e5f;transition:all .2s;border-right:1.5px solid #d4c9b8;display:flex;flex-direction:column;align-items:center;gap:3px}
.step-btn:last-child{border-right:none}
.step-btn.active{background:#1a3a1a;color:#f5ede0}
.step-btn.done{background:#e8f5e8;color:#2d6a2d}
.step-num{font-size:.65rem;opacity:.7}

/* ─ Form Fields ─ */
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:.9rem;margin-bottom:.9rem}
.field-row.full{grid-template-columns:1fr}
.field{display:flex;flex-direction:column;gap:4px}
label{font-size:.72rem;font-weight:600;color:#5a5043;text-transform:uppercase;letter-spacing:.06em}
input,select{padding:.58rem .8rem;border:1.5px solid #d4c9b8;border-radius:8px;font-size:.93rem;color:#1a2e1a;background:#faf8f5;transition:border-color .15s;width:100%}
input:focus,select:focus{outline:none;border-color:#1a3a1a;background:#fff}
.tag{font-size:.68rem;color:#7a6e5f;margin-top:2px;font-style:italic}
.pfx{display:flex;align-items:center;border:1.5px solid #d4c9b8;border-radius:8px;background:#faf8f5;overflow:hidden;transition:border-color .15s}
.pfx:focus-within{border-color:#1a3a1a;background:#fff}
.pfx-lbl{padding:0 .65rem;font-size:.75rem;font-weight:600;color:#7a6e5f;background:#f0ebe3;height:100%;display:flex;align-items:center;border-right:1.5px solid #d4c9b8;white-space:nowrap;min-height:38px}
.pfx input{border:none;border-radius:0;background:transparent;padding-left:.55rem}
.pfx input:focus{box-shadow:none}
.auto-in{background:#f0ebe3!important;color:#5a5043!important}
.rate-hint{background:#f0f7f0;border:1px solid #b8d4b8;border-radius:8px;padding:.45rem .8rem;font-size:.75rem;color:#2d5a2d;margin-top:.2rem}
.conv{font-size:.7rem;color:#2d6a2d;margin-top:2px;font-weight:500}

/* Currency field */
.cfw{display:flex;border:1.5px solid #d4c9b8;border-radius:8px;overflow:hidden;background:#faf8f5;transition:border-color .15s}
.cfw:focus-within{border-color:#1a3a1a;background:#fff}
.cfw select{border:none;border-right:1.5px solid #d4c9b8;border-radius:0;background:#f0ebe3;padding:.58rem .45rem;font-size:.8rem;font-weight:600;color:#5a5043;flex-shrink:0;width:auto}
.cfw input{border:none;border-radius:0;background:transparent;flex:1;padding:.58rem .7rem;font-size:.93rem}

/* ─ Totals & Breakdowns ─ */
.total-box{background:#1a3a1a;border-radius:12px;padding:1.35rem;color:#f5ede0;margin-bottom:1.1rem}
.total-box h3{font-size:.7rem;text-transform:uppercase;letter-spacing:.1em;color:#a8c5a0;margin-bottom:.4rem}
.total-num{font-family:'DM Mono',monospace;font-size:1.85rem;font-weight:500;color:#c9a84c;letter-spacing:-.02em}
.brow{display:flex;justify-content:space-between;align-items:center;padding:.38rem 0;border-bottom:1px solid rgba(255,255,255,.1);font-size:.82rem;gap:.5rem}
.brow:last-child{border-bottom:none}
.brow .bl{color:#a8c5a0;flex:1}
.brow .bv{font-family:'DM Mono',monospace;color:#f5ede0;font-size:.8rem;text-align:right;white-space:nowrap}
.cpc{background:#f5f9f0;border:1.5px solid #b8d4b8;border-radius:10px;padding:.75rem 1rem;display:flex;justify-content:space-between;align-items:center;margin-bottom:.55rem}
.cpc .cl{font-size:.8rem;color:#2d5a2d;font-weight:600}
.cpc .cv{font-family:'DM Mono',monospace;font-size:.95rem;color:#1a3a1a;font-weight:500}

/* ─ Buttons ─ */
.btn{padding:.65rem 1.25rem;border-radius:9px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.86rem;font-weight:600;transition:all .15s}
.btn-dk{background:#1a3a1a;color:#f5ede0}.btn-dk:hover{background:#0f2510}
.btn-lt{background:#f0ebe3;color:#1a3a1a;border:1.5px solid #d4c9b8}.btn-lt:hover{background:#e0d9cf}
.btn-gd{background:#c9a84c;color:#1a3a1a}.btn-gd:hover{background:#b8943a}
.btn-wa{background:#25a244;color:#fff}.btn-wa:hover{background:#1a8035}
.btn-sv{background:#fff;color:#1a3a1a;border:1.5px solid #1a3a1a}.btn-sv:hover{background:#f0ebe3}
.btn-row{display:flex;gap:.55rem;margin-top:.9rem;flex-wrap:wrap}

/* ─ Receipt ─ */
.rcpt{background:#fff;border:2px solid #1a3a1a;border-radius:14px;overflow:hidden}
.rcpt-hd{background:#1a3a1a;color:#f5ede0;padding:1.1rem 1.5rem;text-align:center}
.rcpt-hd .brand{font-family:'Libre Baskerville',serif;font-size:1.2rem;color:#c9a84c;font-weight:700}
.rcpt-hd .sub{font-size:.72rem;color:#a8c5a0;margin-top:3px;letter-spacing:.05em}
.rcpt-meta{display:grid;grid-template-columns:1fr 1fr;padding:.7rem 1.4rem;background:#f8f5f0;border-bottom:1px solid #d4c9b8}
.rmi{padding:.35rem 0}
.rmi .k{font-size:.64rem;text-transform:uppercase;letter-spacing:.07em;color:#7a6e5f;font-weight:600}
.rmi .v{font-size:.84rem;color:#1a2e1a;font-weight:500;margin-top:2px}
.rcpt-body{padding:1.1rem 1.4rem}
.rcpt-body table{width:100%;border-collapse:collapse;font-size:.82rem}
.rcpt-body th{text-align:left;padding:.4rem 0;font-size:.64rem;text-transform:uppercase;letter-spacing:.08em;color:#7a6e5f;border-bottom:2px solid #1a3a1a;font-weight:600}
.rcpt-body td{padding:.52rem 0;border-bottom:1px solid #f0ebe3;color:#1a2e1a}
.mn{font-family:'DM Mono',monospace;font-size:.8rem}
.rt{text-align:right}
.rcpt-tot{background:#1a3a1a;color:#f5ede0;padding:.85rem 1.4rem;display:flex;justify-content:space-between;align-items:center}
.rcpt-tot .tl{font-size:.72rem;text-transform:uppercase;letter-spacing:.08em;color:#a8c5a0}
.rcpt-tot .tv{font-family:'DM Mono',monospace;font-size:1.2rem;color:#c9a84c;font-weight:500}
.rcpt-ft{padding:.8rem 1.4rem;text-align:center;font-size:.68rem;color:#7a6e5f;border-top:1px solid #f0ebe3}
.stamp{display:inline-block;border:2px solid #2d6a2d;color:#2d6a2d;padding:.2rem .8rem;border-radius:4px;font-size:.65rem;font-weight:700;letter-spacing:.1em;transform:rotate(-3deg);margin-top:.35rem;opacity:.7}

/* ─ Selling Estimator ─ */
.sell-card{background:#fff8e8;border:1.5px solid #e8c84c;border-radius:12px;padding:1.1rem;margin-bottom:1.1rem}
.sell-card h3{font-size:.88rem;color:#7a5a00;margin-bottom:.85rem;font-family:'Libre Baskerville',serif}
.sell-grid{display:grid;grid-template-columns:1fr 1fr;gap:.65rem;margin-top:.85rem}
.sell-stat{background:#fff;border-radius:8px;padding:.65rem .9rem;border:1px solid #e8c84c}
.sell-stat .sk{font-size:.65rem;text-transform:uppercase;letter-spacing:.07em;color:#7a5a00;font-weight:600}
.sell-stat .sv{font-family:'DM Mono',monospace;font-size:1rem;color:#1a2e1a;font-weight:500;margin-top:3px}
.sv-g{color:#1a7a1a!important}
.sv-r{color:#b82020!important}
.warn-box{margin-top:.65rem;background:#fef2f2;border:1px solid #f7c1c1;border-radius:8px;padding:.55rem .85rem;font-size:.75rem;color:#b82020}

/* ─ History Panel ─ */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:99}
.hist-panel{position:fixed;top:0;right:0;width:360px;height:100vh;background:#fff;border-left:2px solid #d4c9b8;z-index:100;display:flex;flex-direction:column;box-shadow:-4px 0 20px rgba(0,0,0,.1)}
.hist-ph{background:#1a3a1a;color:#f5ede0;padding:1.1rem 1.4rem;display:flex;justify-content:space-between;align-items:center}
.hist-ph h2{font-size:.95rem;color:#f5ede0;font-family:'Libre Baskerville',serif}
.hist-close{background:none;border:none;color:#a8c5a0;font-size:1.2rem;cursor:pointer;line-height:1}
.hist-pb{flex:1;overflow-y:auto;padding:.9rem}
.hist-empty{text-align:center;padding:2.5rem 1rem;color:#7a6e5f;font-size:.85rem}
.hi{border:1.5px solid #d4c9b8;border-radius:10px;padding:.9rem;margin-bottom:.65rem;cursor:pointer;transition:border-color .15s}
.hi:hover{border-color:#1a3a1a}
.hi-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.35rem}
.hi-title{font-weight:600;font-size:.87rem;color:#1a2e1a}
.hi-date{font-size:.68rem;color:#7a6e5f}
.hi-meta{font-size:.74rem;color:#5a5043;display:flex;gap:.65rem;flex-wrap:wrap}
.hi-total{font-family:'DM Mono',monospace;font-size:.82rem;color:#1a3a1a;font-weight:500;margin-top:.25rem}
.hi-del{background:none;border:none;color:#b82020;cursor:pointer;font-size:.7rem;padding:2px 5px;border-radius:4px}
.hi-del:hover{background:#fef2f2}

/* ─ Sales Table ─ */
.sales-setup-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(145px,1fr));gap:.85rem;margin-bottom:1rem}
.setup-field label{font-size:.7rem;font-weight:600;color:#5a5043;text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:4px}
.setup-field input{width:100%;padding:.55rem .8rem;border:1.5px solid #d4c9b8;border-radius:8px;font-size:.93rem;color:#1a2e1a;background:#faf8f5}
.setup-field input:focus{outline:none;border-color:#1a3a1a;background:#fff}
.total-bags-hint{display:flex;align-items:center;gap:6px;background:#f0f7f0;border:1px solid #b8d4b8;border-radius:8px;padding:.4rem .75rem;font-size:.73rem;color:#2d6a2d;font-weight:500;margin-top:.35rem}
.bags-warn{display:flex;align-items:center;gap:6px;background:#fff8e8;border:1px solid #e8c84c;border-radius:8px;padding:.4rem .75rem;font-size:.73rem;color:#7a5a00;font-weight:500;margin-top:.35rem}

.sales-metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(115px,1fr));gap:.75rem;margin-bottom:1rem}
.sm{background:#fff;border:1.5px solid #d4c9b8;border-radius:10px;padding:.85rem}
.sm-label{font-size:.68rem;font-weight:600;color:#7a6e5f;text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px}
.sm-value{font-family:'DM Mono',monospace;font-size:1.05rem;font-weight:500;color:#1a2e1a}
.sm-value.green{color:#1a7a1a}
.sm-value.amber{color:#b87a00}
.sm-value.red{color:#b82020}
.sm-bar{height:5px;border-radius:3px;background:#e8e0d4;margin-top:6px;overflow:hidden}
.sm-fill{height:100%;border-radius:3px;background:#2d6a2d;transition:width .3s}

.stbl{width:100%;border-collapse:collapse;font-size:.83rem}
.stbl thead th{text-align:left;font-size:.67rem;font-weight:600;color:#7a6e5f;text-transform:uppercase;letter-spacing:.05em;padding:6px 7px;border-bottom:1.5px solid #d4c9b8}
.stbl tbody tr.day-row{border-bottom:1px solid #f0ebe3}
.stbl tbody tr.day-row:hover{background:#faf8f5}
.stbl tbody tr.has-sales{background:#f5f9f0}
.stbl tbody tr.drawer-tr td{padding:0;border-bottom:1.5px solid #b8d4b8}
.stbl td{padding:6px 7px;vertical-align:middle}
.stbl td.muted{color:#7a6e5f;font-size:.76rem}
.stbl td.rev-c{text-align:right;font-family:'DM Mono',monospace;font-weight:600;color:#1a7a1a;font-size:.85rem;white-space:nowrap}
.stbl td.rev-c.zero{color:#b8b0a4;font-weight:400}
.stbl td.left-c{text-align:right;font-size:.82rem}
.stbl td.left-c.low{color:#b87a00}
.stbl td.left-c.none{color:#b82020}
.ci{width:100%;border:1.5px solid #d4c9b8;border-radius:7px;padding:6px 9px;font-size:.93rem;background:#fff;color:#1a2e1a;text-align:right}
.ci:focus{outline:none;border-color:#1a3a1a}
.ci.sugg{color:#9a8e7f}
.disc-note{font-size:.7rem;color:#7a6e5f;text-align:right;margin-top:3px}
.disc-btn{background:none;border:1.5px solid #d4c9b8;border-radius:7px;padding:4px 9px;cursor:pointer;font-size:.75rem;color:#5a5043;display:inline-flex;align-items:center;gap:3px;white-space:nowrap;transition:all .15s}
.disc-btn:hover{background:#f0ebe3;border-color:#b8b0a4}
.disc-btn.open{background:#f0f7f0;border-color:#b8d4b8;color:#2d6a2d}
.disc-arrow{display:inline-block;transition:transform .2s;font-size:.65rem}
.disc-btn.open .disc-arrow{transform:rotate(180deg)}
.add-disc-btn{background:none;border:1.5px dashed #d4c9b8;border-radius:7px;padding:4px 9px;cursor:pointer;font-size:.75rem;color:#7a6e5f}
.add-disc-btn:hover{border-color:#b8b0a4;color:#1a2e1a}

.drawer-wrap{background:#f5f9f0;border-left:3px solid #2d6a2d}
.drawer-inner{padding:10px 14px 12px}
.drawer-head{display:grid;grid-template-columns:22px 1fr 1fr 1fr 26px;gap:7px;align-items:center;padding-bottom:7px;border-bottom:1px solid #d4c9b8;margin-bottom:8px}
.dh{font-size:.65rem;font-weight:600;color:#5a5043;text-transform:uppercase;letter-spacing:.04em}
.dh.r{text-align:right}
.drawer-entry{display:grid;grid-template-columns:22px 1fr 1fr 1fr 26px;gap:7px;align-items:center;margin-bottom:7px}
.drawer-entry input{width:100%;border:1.5px solid #d4c9b8;border-radius:7px;padding:7px 9px;font-size:.93rem;background:#fff;color:#1a2e1a;text-align:right}
.drawer-entry input:focus{outline:none;border-color:#2d6a2d}
.de-num{width:22px;height:22px;border-radius:50%;background:#e8f5e8;display:flex;align-items:center;justify-content:center;font-size:.68rem;font-weight:600;color:#2d6a2d}
.de-total{text-align:right;font-size:.82rem;font-weight:600;color:#1a7a1a;font-family:'DM Mono',monospace}
.de-total.zero{color:#b8b0a4;font-weight:400}
.rm-btn{background:none;border:none;color:#b8b0a4;cursor:pointer;font-size:.82rem;padding:0;text-align:center}
.rm-btn:hover{color:#b82020}
.drawer-foot{display:flex;justify-content:space-between;align-items:center;padding-top:8px;border-top:1px solid #d4c9b8;margin-top:3px}
.d-total-lbl{font-size:.78rem;color:#5a5043}
.d-total-lbl strong{color:#1a2e1a;font-weight:600;font-family:'DM Mono',monospace}
.add-de-btn{background:none;border:1.5px dashed #b8d4b8;border-radius:7px;font-size:.75rem;color:#5a5043;padding:4px 10px;cursor:pointer}
.add-de-btn:hover{background:#e8f5e8}

.add-day-btn{width:100%;margin-top:.75rem;padding:8px;border:1.5px dashed #d4c9b8;border-radius:10px;background:none;color:#7a6e5f;font-size:.83rem;cursor:pointer;transition:all .15s}
.add-day-btn:hover{background:#f5f9f0;border-color:#2d6a2d;color:#2d6a2d}

/* ─ Profit Tab ─ */
.profit-hero{background:#1a3a1a;border-radius:14px;padding:1.75rem;margin-bottom:1.1rem;text-align:center}
.profit-hero .ph-label{font-size:.72rem;text-transform:uppercase;letter-spacing:.12em;color:#a8c5a0;margin-bottom:.4rem}
.profit-hero .ph-amount{font-family:'DM Mono',monospace;font-size:2.4rem;font-weight:500;letter-spacing:-.02em}
.profit-hero .ph-amount.pos{color:#c9a84c}
.profit-hero .ph-amount.neg{color:#f09595}
.profit-hero .ph-amount.zero{color:#a8c5a0}
.profit-hero .ph-sub{font-size:.8rem;color:#a8c5a0;margin-top:.35rem}
.profit-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:.85rem;margin-bottom:1.1rem}
.pg{background:#fff;border:1.5px solid #d4c9b8;border-radius:12px;padding:1rem}
.pg-label{font-size:.68rem;font-weight:600;color:#7a6e5f;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.pg-value{font-family:'DM Mono',monospace;font-size:1.15rem;font-weight:500;color:#1a2e1a}
.pg-value.green{color:#1a7a1a}
.pg-value.red{color:#b82020}
.pg-value.gold{color:#b87a00}
.pg-sub{font-size:.7rem;color:#7a6e5f;margin-top:3px}
.vs-bar{background:#fff;border:1.5px solid #d4c9b8;border-radius:12px;padding:1.1rem;margin-bottom:1.1rem}
.vs-bar h3{font-size:.82rem;font-weight:600;color:#5a5043;text-transform:uppercase;letter-spacing:.06em;margin-bottom:.85rem;font-family:'DM Sans',sans-serif}
.vs-row{display:flex;align-items:center;gap:.85rem;margin-bottom:.85rem}
.vs-row:last-child{margin-bottom:0}
.vs-lbl{font-size:.78rem;color:#5a5043;width:90px;flex-shrink:0;font-weight:500}
.vs-track{flex:1;height:10px;background:#f0ebe3;border-radius:5px;overflow:hidden;position:relative}
.vs-fill{height:100%;border-radius:5px;transition:width .4s}
.vs-fill.cost{background:#b82020}
.vs-fill.rev{background:#2d6a2d}
.vs-fill.profit{background:#c9a84c}
.vs-amt{font-size:.78rem;font-family:'DM Mono',monospace;color:#1a2e1a;width:145px;text-align:right;flex-shrink:0}
.breakeven-card{background:#fff8e8;border:1.5px solid #e8c84c;border-radius:12px;padding:1.1rem;margin-bottom:1.1rem}
.breakeven-card h3{font-size:.82rem;font-weight:600;color:#7a5a00;margin-bottom:.75rem;font-family:'DM Sans',sans-serif;text-transform:uppercase;letter-spacing:.06em}
.be-stat{display:flex;justify-content:space-between;align-items:center;padding:.42rem 0;border-bottom:1px solid #f0dfa0;font-size:.83rem}
.be-stat:last-child{border-bottom:none}
.be-lbl{color:#7a5a00}
.be-val{font-family:'DM Mono',monospace;color:#1a2e1a;font-weight:500}
.no-data{text-align:center;padding:2.5rem 1rem;color:#7a6e5f}
.no-data .nd-icon{font-size:2rem;margin-bottom:.75rem}
.no-data p{font-size:.85rem}
.no-data .nd-hint{font-size:.75rem;color:#b8b0a4;margin-top:.35rem}

/* ─ Misc ─ */
.section-divider{height:1.5px;background:#f0ebe3;margin:1rem 0}
.info-box{background:#f0f7f0;border:1px solid #b8d4b8;border-radius:8px;padding:.55rem .85rem;font-size:.77rem;color:#2d5a2d;margin-bottom:.85rem}

@media(max-width:520px){
  .field-row{grid-template-columns:1fr}
  .rcpt-meta{grid-template-columns:1fr}
  .hist-panel{width:100%}
  .sell-grid{grid-template-columns:1fr}
  .profit-grid{grid-template-columns:1fr 1fr}
}
@media print{
  .no-print{display:none!important}
  .app-header,.main-tabs,.hist-panel,.overlay{display:none!important}
  .container{padding:0;max-width:100%}
  .rcpt{border:2px solid #000;border-radius:0}
  .rcpt-hd,.rcpt-tot{-webkit-print-color-adjust:exact;print-color-adjust:exact}
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useRef} = React;
const fmt = n => Math.round(n).toLocaleString('en-UG');
const fmtD = n => n.toLocaleString('en-UG',{minimumFractionDigits:2,maximumFractionDigits:2});
const DEF = {Kenya:28.5,Tanzania:0.165};
const CUR = {Kenya:'KES',Tanzania:'TZS'};
const SKEY = 'otm_v1';
const todayJs = new Date();
const todayStr = `${todayJs.getFullYear()}-${String(todayJs.getMonth()+1).padStart(2,'0')}-${String(todayJs.getDate()).padStart(2,'0')}`;
const todayDisplay = todayJs.toLocaleDateString('en-UG',{year:'numeric',month:'long',day:'numeric'});

function toUGX(amt,cur,oc,rate){
  const a=parseFloat(amt)||0;
  if(cur==='UGX') return a;
  if(cur===oc) return a*(parseFloat(rate)||0);
  return a;
}
function loadT(){try{return JSON.parse(localStorage.getItem(SKEY)||'[]')}catch{return[]}}
function saveT(t){try{localStorage.setItem(SKEY,JSON.stringify(t))}catch{}}
function blankDay(){return{priceOverride:null,marketBags:0,discount:[],open:false};}

const BLANK={
  bossName:'',yourName:'',vehicleNo:'',originCountry:'Kenya',commodity:'Onions',
  numBags:'',kgPerBag:'',pricePerKg:'',pricePerBagDirect:'',
  exchangeRate:DEF['Kenya'],
  borderTax:'',borderTaxCur:'UGX',
  truckHire:'',truckHireCur:'KES',
  otherCosts:'',otherCostsCur:'UGX',
};

/* ── CostField ── */
function CostField({label,hint,value,onChange,cur,onCur,oc,rate}){
  const ugx=toUGX(value,cur,oc,rate);
  return(
    <div className="field" style={{marginBottom:'.9rem'}}>
      <label>{label}</label>
      <div className="cfw">
        <select value={cur} onChange={e=>onCur(e.target.value)}>
          <option value="UGX">UGX</option>
          <option value={oc}>{oc}</option>
        </select>
        <input type="number" value={value} onChange={e=>onChange(e.target.value)} placeholder="0"/>
      </div>
      {cur!=='UGX'&&parseFloat(value)>0&&<div className="conv">= UGX {fmt(ugx)} (converted)</div>}
      {hint&&<span className="tag">{hint}</span>}
    </div>
  );
}

/* ── HistPanel ── */
function HistPanel({trips,onClose,onLoad,onDel}){
  return(<>
    <div className="overlay" onClick={onClose}/>
    <div className="hist-panel">
      <div className="hist-ph">
        <h2>Trip History</h2>
        <button className="hist-close" onClick={onClose}>✕</button>
      </div>
      <div className="hist-pb">
        {trips.length===0
          ?<div className="hist-empty">No saved trips yet.<br/>Complete a trip and save it to see it here.</div>
          :[...trips].reverse().map(t=>(
            <div key={t.id} className="hi" onClick={()=>{onLoad(t);onClose();}}>
              <div className="hi-top">
                <div>
                  <div className="hi-title">{t.commodity} — {t.originCountry}</div>
                  <div className="hi-date">{t.date}</div>
                </div>
                <button className="hi-del" onClick={e=>{e.stopPropagation();onDel(t.id);}} title="Delete">🗑</button>
              </div>
              <div className="hi-meta">
                <span>{fmt(t.numBags)} bags</span>
                {t.vehicleNo&&<span>🚚 {t.vehicleNo}</span>}
                {t.bossName&&<span>→ {t.bossName}</span>}
              </div>
              <div className="hi-total">Expenses: UGX {fmt(t.totalUGX)}</div>
              {t.costPerBag>0&&<div style={{fontSize:'.72rem',color:'#2d6a2d',marginTop:2}}>UGX {fmt(t.costPerBag)}/bag all-in</div>}
            </div>
          ))
        }
      </div>
    </div>
  </>);
}

/* ── DiscountDrawer ── */
function DiscountDrawer({day,dayIdx,updateDay}){
  const entries=day.discount||[];
  const stats=entries.reduce((s,l)=>({bags:s.bags+(l.bags||0),rev:s.rev+(l.bags||0)*(l.price||0)}),{bags:0,rev:0});
  function setEntry(i,field,val){
    updateDay(dayIdx,d=>{
      const oldBags=d.discount.reduce((s,l)=>s+(l.bags||0),0);
      const nd=[...d.discount];
      nd[i]={...nd[i],[field]:field==='bags'?parseInt(val)||0:parseFloat(val)||0};
      const newBags=nd.reduce((s,l)=>s+(l.bags||0),0);
      return{...d,discount:nd,marketBags:Math.max(0,d.marketBags+(oldBags-newBags))};
    });
  }
  function removeEntry(i){
    updateDay(dayIdx,d=>{
      const totalBefore=(d.marketBags||0)+d.discount.reduce((s,l)=>s+(l.bags||0),0);
      const nd=d.discount.filter((_,idx)=>idx!==i);
      const newDiscBags=nd.reduce((s,l)=>s+(l.bags||0),0);
      return{...d,discount:nd,marketBags:Math.max(0,totalBefore-newDiscBags),open:nd.length>0};
    });
  }
  function addEntry(){
    updateDay(dayIdx,d=>({...d,discount:[...d.discount,{bags:1,price:''}]}));
  }
  return(
    <div className="drawer-wrap">
      <div className="drawer-inner">
        <div className="drawer-head">
          <div/>
          <div className="dh">Bags sold</div>
          <div className="dh">Price sold (UGX)</div>
          <div className="dh r">Total</div>
          <div/>
        </div>
        {entries.map((e,i)=>{
          const t=(e.bags||0)*(e.price||0);
          return(
            <div className="drawer-entry" key={i}>
              <div className="de-num">{i+1}</div>
              <input type="number" min="1" value={e.bags||''} placeholder="bags" onChange={ev=>setEntry(i,'bags',ev.target.value)}/>
              <input type="number" step="1000" value={e.price||''} placeholder="price (UGX)" onChange={ev=>setEntry(i,'price',ev.target.value)}/>
              <div className={`de-total ${t===0?'zero':''}`}>{t>0?'UGX '+fmt(t):'—'}</div>
              <button className="rm-btn" onClick={()=>removeEntry(i)}>✕</button>
            </div>
          );
        })}
        <div className="drawer-foot">
          <button className="add-de-btn" onClick={addEntry}>+ add customer</button>
          <div className="d-total-lbl">{stats.bags} bag{stats.bags!==1?'s':''} &nbsp;·&nbsp; <strong>UGX {fmt(stats.rev)}</strong></div>
        </div>
      </div>
    </div>
  );
}

/* ── SalesRow ── */
function SalesRow({day,dayIdx,suggestedPrice,updateDay,bagsLeft,hasSales,totalSold,dayRev,dateLabel}){
  const sp=suggestedPrice(dayIdx);
  const mp=day.priceOverride!==null?day.priceOverride:sp;
  const discStats=(day.discount||[]).reduce((s,l)=>({bags:s.bags+(l.bags||0),rev:s.rev+(l.bags||0)*(l.price||0)}),{bags:0,rev:0});
  const hasDisc=discStats.bags>0;
  const leftClass=bagsLeft<=0?'none':(bagsLeft<=10?'low':'');
  const displayTotal=totalSold>0?totalSold:'';

  return(<>
    <tr className={`day-row ${hasSales?'has-sales':''}`}>
      <td style={{fontWeight:500,fontSize:'.78rem',color:'#1a2e1a'}}>{dayIdx+1}</td>
      <td className="muted">{dateLabel}</td>
      <td style={{textAlign:'right',fontSize:'.75rem',color:'#9a8e7f'}}>{fmt(sp)}</td>
      <td>
        <input className={`ci ${day.priceOverride===null?'sugg':''}`} type="number" step="1000" value={Math.round(mp)}
          onChange={e=>{
            updateDay(dayIdx,d=>({...d,priceOverride:parseFloat(e.target.value)||0}));
          }}/>
      </td>
      <td>
        <input className="ci" type="number" min="0" value={displayTotal} placeholder="0"
          onChange={e=>{
            const typed=parseInt(e.target.value)||0;
            updateDay(dayIdx,d=>{
              const discBags=(d.discount||[]).reduce((s,l)=>s+(l.bags||0),0);
              return{...d,marketBags:Math.max(0,typed-discBags)};
            });
          }}/>
        {hasDisc&&<div className="disc-note">{discStats.bags} sold at discount</div>}
      </td>
      <td className={`rev-c ${dayRev===0?'zero':''}`}>{dayRev>0?'UGX '+fmt(dayRev):'—'}</td>
      <td className={`left-c ${leftClass}`}>{bagsLeft>=0?bagsLeft:'!'}</td>
      <td style={{textAlign:'right'}}>
        {hasDisc
          ?<button className={`disc-btn ${day.open?'open':''}`} onClick={()=>updateDay(dayIdx,d=>({...d,open:!d.open}))}>
              discount <span className="disc-arrow">▼</span>
            </button>
          :<button className="add-disc-btn" onClick={()=>updateDay(dayIdx,d=>({...d,discount:[{bags:1,price:''}],open:true}))}>+ discount</button>
        }
      </td>
    </tr>
    {day.open&&hasDisc&&(
      <tr className="drawer-tr">
        <td colSpan={8}>
          <DiscountDrawer day={day} dayIdx={dayIdx} updateDay={updateDay}/>
        </td>
      </tr>
    )}
  </>);
}

/* ── SalesTab ── */
function SalesTab({entryDate,setEntryDate,startPrice,setStartPrice,priceDrop,setPriceDrop,numBagsFromExp,days,updateDay,addDay,suggestedPrice,getDayDate,fmtDate,totalRevenue,totalSold}){
  function dayDiscStats(d){
    return (d.discount||[]).reduce((s,l)=>({bags:s.bags+(l.bags||0),rev:s.rev+(l.bags||0)*(l.price||0)}),{bags:0,rev:0});
  }
  function dayTotal(d){return(d.marketBags||0)+dayDiscStats(d).bags;}
  function dayRev(d,i){
    const p=d.priceOverride!==null?d.priceOverride:suggestedPrice(i);
    return(d.marketBags||0)*p+dayDiscStats(d).rev;
  }
  function bagsLeftBefore(dayIdx){
    let sold=0;
    for(let i=0;i<dayIdx;i++) sold+=dayTotal(days[i]);
    return numBagsFromExp-sold;
  }
  const pct=numBagsFromExp>0?Math.round(totalSold/numBagsFromExp*100):0;
  const remaining=numBagsFromExp-totalSold;
  const avgPrice=totalSold>0?Math.round(totalRevenue/totalSold):0;
  const nextDate=getDayDate(days.length);
  const nextLabel=nextDate?'('+fmtDate(nextDate)+')':'';

  return(
    <div>
      <div className="card">
        <h2>🌿 Sales Setup</h2>
        <div className="sales-setup-grid">
          <div className="setup-field">
            <label>Market Entry Date</label>
            <input type="date" value={entryDate} onChange={e=>setEntryDate(e.target.value)}/>
          </div>
          <div className="setup-field">
            <label>Total Bags</label>
            {numBagsFromExp>0
              ?<div className="total-bags-hint">✓ {fmt(numBagsFromExp)} bags from expenses</div>
              :<div className="bags-warn">⚠ Enter bags in Expenses tab</div>
            }
          </div>
          <div className="setup-field">
            <label>Day 1 Price (UGX)</label>
            <input type="number" step="1000" value={startPrice} onChange={e=>setStartPrice(parseFloat(e.target.value)||0)}/>
          </div>
          <div className="setup-field">
            <label>Daily Price Drop (UGX)</label>
            <input type="number" step="1000" value={priceDrop} onChange={e=>setPriceDrop(parseFloat(e.target.value)||0)}/>
          </div>
        </div>
      </div>

      <div className="sales-metrics">
        <div className="sm"><div className="sm-label">Total Revenue</div><div className="sm-value green">{totalRevenue>0?'UGX '+fmt(totalRevenue):'—'}</div></div>
        <div className="sm"><div className="sm-label">Bags Sold</div><div className="sm-value">{totalSold>0?totalSold+' / '+numBagsFromExp:'— / '+numBagsFromExp}</div></div>
        <div className="sm"><div className="sm-label">Remaining</div><div className={`sm-value ${remaining<=0?'red':remaining<numBagsFromExp*.2?'amber':''}`}>{numBagsFromExp>0?remaining:'—'}</div></div>
        <div className="sm"><div className="sm-label">Avg Price/Bag</div><div className="sm-value">{avgPrice>0?'UGX '+fmt(avgPrice):'—'}</div></div>
        <div className="sm">
          <div className="sm-label">Sell-through</div>
          <div className="sm-value">{pct}%</div>
          <div className="sm-bar"><div className="sm-fill" style={{width:pct+'%'}}/></div>
        </div>
      </div>

      <div className="card" style={{padding:'1.1rem 1.25rem'}}>
        <h2 style={{marginBottom:'1rem'}}>📋 Daily Sales Log</h2>
        <div style={{overflowX:'auto'}}>
          <table className="stbl">
            <thead>
              <tr>
                <th style={{width:28}}>Day</th>
                <th>Date</th>
                <th style={{textAlign:'right'}}>Suggested (UGX)</th>
                <th style={{textAlign:'right'}}>Price (UGX)</th>
                <th style={{textAlign:'right'}}>Bags Sold</th>
                <th style={{textAlign:'right'}}>Revenue</th>
                <th style={{textAlign:'right'}}>Bags Left</th>
                <th style={{width:95}}></th>
              </tr>
            </thead>
            <tbody>
              {days.map((day,i)=>{
                const tot=dayTotal(day);
                const rev=dayRev(day,i);
                const left=bagsLeftBefore(i)-tot;
                return(
                  <SalesRow key={i} day={day} dayIdx={i} suggestedPrice={suggestedPrice}
                    updateDay={updateDay} bagsLeft={left} hasSales={tot>0}
                    totalSold={tot} dayRev={rev} dateLabel={fmtDate(getDayDate(i))}/>
                );
              })}
            </tbody>
          </table>
        </div>
        <button className="add-day-btn" onClick={addDay}>+ Add day {nextLabel}</button>
      </div>
    </div>
  );
}

/* ── ProfitTab ── */
function ProfitTab({totalExpenses,totalRevenue,netProfit,roi,cpb,avgSalePrice,numBags,totalSold,form}){
  const hasData=totalExpenses>0||totalRevenue>0;
  if(!hasData) return(
    <div className="no-data">
      <div className="nd-icon">📊</div>
      <p>No data yet to show profit.</p>
      <div className="nd-hint">Fill in the Expenses tab and log sales in the Sales tab first.</div>
    </div>
  );
  const remaining=numBags-totalSold;
  const unsoldCost=remaining>0?remaining*cpb:0;
  const realizedProfit=totalRevenue-(totalSold*cpb);
  const breakevenBags=cpb>0&&avgSalePrice>0?Math.ceil(totalExpenses/avgSalePrice):0;
  const maxBar=Math.max(totalExpenses,totalRevenue)||1;
  const breakEvenReached=totalRevenue>=totalExpenses;

  return(
    <div>
      <div className="profit-hero">
        <div className="ph-label">Net Profit / Loss</div>
        <div className={`ph-amount ${netProfit>0?'pos':netProfit<0?'neg':'zero'}`}>
          {netProfit>=0?'+':''}UGX {fmt(Math.abs(netProfit))}
        </div>
        <div className="ph-sub">
          {netProfit>0?`Return of ${fmtD(roi)}% on investment`:
           netProfit<0?`Loss of ${fmtD(Math.abs(roi))}% on investment`:
           'Break-even — no profit, no loss'}
        </div>
      </div>

      <div className="profit-grid">
        <div className="pg">
          <div className="pg-label">Total Invested</div>
          <div className="pg-value red">UGX {fmt(totalExpenses)}</div>
          <div className="pg-sub">{numBags>0?fmt(numBags)+' bags':''}</div>
        </div>
        <div className="pg">
          <div className="pg-label">Total Revenue</div>
          <div className="pg-value green">{totalRevenue>0?'UGX '+fmt(totalRevenue):'—'}</div>
          <div className="pg-sub">{totalSold>0?totalSold+' bags sold':''}</div>
        </div>
        <div className="pg">
          <div className="pg-label">Cost per Bag</div>
          <div className="pg-value">{cpb>0?'UGX '+fmt(cpb):'—'}</div>
          <div className="pg-sub">all-in cost</div>
        </div>
        <div className="pg">
          <div className="pg-label">Avg Sale Price</div>
          <div className={`pg-value ${avgSalePrice>cpb?'green':avgSalePrice>0?'red':''}`}>
            {avgSalePrice>0?'UGX '+fmt(avgSalePrice):'—'}
          </div>
          <div className="pg-sub">{avgSalePrice>0&&cpb>0?'UGX '+fmt(avgSalePrice-cpb)+' margin/bag':''}</div>
        </div>
        {remaining>0&&<div className="pg">
          <div className="pg-label">Unsold Bags</div>
          <div className="pg-value gold">{remaining} bags</div>
          <div className="pg-sub">UGX {fmt(unsoldCost)} at risk</div>
        </div>}
        <div className="pg">
          <div className="pg-label">Sell-through</div>
          <div className={`pg-value ${totalSold>=numBags?'green':''}`}>
            {numBags>0?Math.round(totalSold/numBags*100)+'%':'—'}
          </div>
          <div className="pg-sub">{totalSold} of {numBags} bags</div>
        </div>
      </div>

      <div className="vs-bar">
        <h3>Revenue vs Expenses</h3>
        <div className="vs-row">
          <div className="vs-lbl">Expenses</div>
          <div className="vs-track">
            <div className="vs-fill cost" style={{width:Math.round(totalExpenses/maxBar*100)+'%'}}/>
          </div>
          <div className="vs-amt">UGX {fmt(totalExpenses)}</div>
        </div>
        <div className="vs-row">
          <div className="vs-lbl">Revenue</div>
          <div className="vs-track">
            <div className="vs-fill rev" style={{width:Math.round(totalRevenue/maxBar*100)+'%'}}/>
          </div>
          <div className="vs-amt">UGX {fmt(totalRevenue)}</div>
        </div>
        {netProfit!==0&&<div className="vs-row">
          <div className="vs-lbl">{netProfit>0?'Profit':'Loss'}</div>
          <div className="vs-track">
            <div className="vs-fill profit" style={{width:Math.round(Math.abs(netProfit)/maxBar*100)+'%',background:netProfit>0?'#c9a84c':'#b82020'}}/>
          </div>
          <div className="vs-amt" style={{color:netProfit>0?'#1a7a1a':'#b82020'}}>{netProfit>0?'+':'–'} UGX {fmt(Math.abs(netProfit))}</div>
        </div>}
      </div>

      <div className="breakeven-card">
        <h3>Break-Even Analysis</h3>
        <div className="be-stat">
          <span className="be-lbl">Break-even price per bag</span>
          <span className="be-val">UGX {cpb>0?fmt(cpb):'—'}</span>
        </div>
        <div className="be-stat">
          <span className="be-lbl">Current avg sale price</span>
          <span className="be-val" style={{color:avgSalePrice>cpb?'#1a7a1a':'#b82020'}}>{avgSalePrice>0?'UGX '+fmt(avgSalePrice):'—'}</span>
        </div>
        {breakevenBags>0&&<div className="be-stat">
          <span className="be-lbl">Bags needed to break even</span>
          <span className="be-val" style={{color:totalSold>=breakevenBags?'#1a7a1a':'#b87a00'}}>{breakevenBags} bags {totalSold>=breakevenBags?'✓ reached':''}</span>
        </div>}
        <div className="be-stat">
          <span className="be-lbl">Profit from bags sold so far</span>
          <span className="be-val" style={{color:realizedProfit>=0?'#1a7a1a':'#b82020'}}>{realizedProfit>=0?'+':''}UGX {fmt(realizedProfit)}</span>
        </div>
        {remaining>0&&cpb>0&&<div className="be-stat">
          <span className="be-lbl">Potential from remaining {remaining} bags</span>
          <span className="be-val" style={{color:'#b87a00'}}>+ UGX {fmt(remaining*avgSalePrice)} at avg price</span>
        </div>}
      </div>
    </div>
  );
}

/* ── ExpensesTab ── */
function ExpensesTab({form,set,isTZ,oc,rate,numBags,kgPerBag,totalKg,totalT,ppkDirect,ppkKg,ppBag,buyUGX,btUGX,thUGX,ocUGX,totalExpenses,cpb,cpkg,s1ok,s2ok,expStep,setExpStep,changeCountry,expSaved,doSaveTrip,doNew}){
  const rno='RCT-'+Date.now().toString().slice(-6);

  const doWA=()=>{
    const lines=[
      '*IMPORT EXPENSE RECEIPT*',
      `Receipt: ${rno} | ${todayDisplay}`,
      '---',
      `Commodity: ${form.commodity} (${form.originCountry})`,
      `Truck: ${form.vehicleNo||'—'}`,
      `Bags: ${fmt(numBags)} bags${kgPerBag>0?' @ '+fmt(kgPerBag)+'kg':''}`,
      '---',
      `Purchase Price: UGX ${fmt(buyUGX)}`,
      `Border Tax: UGX ${fmt(btUGX)}`,
      `Truck Hire: UGX ${fmt(thUGX)}`,
      ocUGX>0?`Other Costs: UGX ${fmt(ocUGX)}`:'',
      '---',
      `*TOTAL: UGX ${fmt(totalExpenses)}*`,
      `Cost/bag: UGX ${fmt(cpb)}`,
      totalKg>0?`Cost/kg: UGX ${fmt(cpkg)}`:'',
      '---',
      `Prepared by: ${form.yourName||'—'} | For: ${form.bossName||'—'}`,
    ].filter(Boolean).join('\n');
    window.open('https://wa.me/?text='+encodeURIComponent(lines),'_blank');
  };

  const doPDF=()=>{
    const {jsPDF}=window.jspdf;
    const doc=new jsPDF({unit:'mm',format:'a5'});
    const W=doc.internal.pageSize.getWidth(),L=12,R=W-12;
    let y=15;
    doc.setFont('helvetica','bold');doc.setFontSize(13);doc.setTextColor(26,58,26);
    doc.text('IMPORT EXPENSE RECEIPT',W/2,y,{align:'center'});y+=8;
    doc.setFont('helvetica','normal');doc.setFontSize(8);doc.setTextColor(100,100,100);
    doc.text('Uganda Cross-Border Trade Calculator',W/2,y,{align:'center'});y+=7;
    doc.setDrawColor(26,58,26);doc.setLineWidth(.5);doc.line(L,y,R,y);y+=6;
    doc.setFontSize(8);doc.setTextColor(50,50,50);
    const row=(l,v)=>{doc.setFont('helvetica','normal');doc.text(l,L,y);doc.text(v,R,y,{align:'right'});y+=6;};
    row('Receipt No:',rno);row('Date:',todayDisplay);row('Prepared by:',form.yourName||'—');row('Submitted to:',form.bossName||'—');row('Vehicle No.:',form.vehicleNo||'—');
    y+=2;doc.line(L,y,R,y);y+=5;
    doc.setFont('helvetica','bold');doc.text('EXPENSE BREAKDOWN',L,y);y+=6;
    row(`Purchase Price (${oc}→UGX):`,`UGX ${fmt(buyUGX)}`);
    row('Border Tax:',`UGX ${fmt(btUGX)}`);
    row('Truck Hire:',`UGX ${fmt(thUGX)}`);
    if(parseFloat(form.otherCosts)>0)row('Other Costs:',`UGX ${fmt(ocUGX)}`);
    y+=2;doc.setDrawColor(26,58,26);doc.line(L,y,R,y);y+=6;
    doc.setFont('helvetica','bold');doc.setFontSize(11);
    doc.text('TOTAL EXPENSES:',L,y);doc.text(`UGX ${fmt(totalExpenses)}`,R,y,{align:'right'});y+=8;
    doc.setFontSize(8);
    row('Cost per Bag (all-in):',`UGX ${fmt(cpb)}`);
    if(totalKg>0)row('Cost per kg:',`UGX ${fmt(cpkg)}`);
    y+=6;doc.setFont('helvetica','italic');doc.setFontSize(7);doc.setTextColor(150,140,120);
    doc.text('Generated by Onion Trade Manager',W/2,y,{align:'center'});
    doc.save(`receipt-${rno}.pdf`);
  };

  return(
    <div>
      <div className="steps no-print">
        {[{n:1,l:'Trip Details'},{n:2,l:'Costs'},{n:3,l:'Receipt'}].map(s=>(
          <button key={s.n} className={`step-btn ${expStep===s.n?'active':expStep>s.n?'done':''}`}
            onClick={()=>s.n===3?(s1ok&&s2ok&&setExpStep(3)):setExpStep(s.n)}>
            <span className="step-num">Step {s.n}</span>{s.l}
          </button>
        ))}
      </div>

      {expStep===1&&(
        <div>
          <div className="card">
            <h2>🚚 Trip Details</h2>
            <div className="field-row">
              <div className="field">
                <label>Origin Country</label>
                <select value={form.originCountry} onChange={e=>changeCountry(e.target.value)}>
                  <option>Kenya</option><option>Tanzania</option>
                </select>
              </div>
              <div className="field">
                <label>Commodity</label>
                <input value={form.commodity} onChange={e=>set('commodity',e.target.value)} placeholder="e.g. Onions"/>
              </div>
            </div>
            <div className="field-row">
              <div className="field">
                <label>Number of Bags on Truck</label>
                <div className="pfx"><span className="pfx-lbl">bags</span><input type="number" value={form.numBags} onChange={e=>set('numBags',e.target.value)} placeholder="0"/></div>
              </div>
              <div className="field">
                <label>Weight per Bag — optional</label>
                <div className="pfx"><span className="pfx-lbl">kg/bag</span><input type="number" value={form.kgPerBag} onChange={e=>set('kgPerBag',e.target.value)} placeholder="optional"/></div>
              </div>
            </div>
            {totalKg>0&&(
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'.75rem',background:'#f5f9f0',border:'1.5px solid #b8d4b8',borderRadius:10,padding:'.8rem 1rem',marginBottom:'.9rem'}}>
                <div><div style={{fontSize:'.68rem',textTransform:'uppercase',letterSpacing:'.07em',color:'#2d6a2d',fontWeight:600}}>Total Weight</div><div style={{fontSize:'.95rem',fontWeight:500,marginTop:3}}>{fmt(totalKg)} kg</div></div>
                <div><div style={{fontSize:'.68rem',textTransform:'uppercase',letterSpacing:'.07em',color:'#2d6a2d',fontWeight:600}}>Tonnes on Truck</div><div style={{fontSize:'.95rem',fontWeight:500,marginTop:3}}>{fmtD(totalT)} tonnes</div></div>
              </div>
            )}
            <div className="field-row">
              <div className="field">
                <label>Price per Bag ({oc}) — direct</label>
                <div className="pfx"><span className="pfx-lbl">{oc}/bag</span><input type="number" step="1" value={form.pricePerBagDirect} onChange={e=>set('pricePerBagDirect',e.target.value)} placeholder="0"/></div>
                <span className="tag">Enter what you paid per bag at source</span>
              </div>
              {!isTZ&&(
                <div className="field">
                  <label>OR: Price per kg (KES)</label>
                  <div className="pfx"><span className="pfx-lbl">KES/kg</span><input type="number" step=".01" value={form.pricePerKg} onChange={e=>set('pricePerKg',e.target.value)} placeholder="optional"/></div>
                  <span className="tag">Needs kg/bag filled to auto-calculate</span>
                </div>
              )}
            </div>
            {!isTZ&&ppkKg>0&&kgPerBag>0&&!ppkDirect&&(
              <div className="info-box">Auto price per bag: <strong>KES {fmtD(ppkKg*kgPerBag)}</strong> (= {fmtD(ppkKg)} × {fmt(kgPerBag)} kg)</div>
            )}
            <div className="field-row">
              <div className="field">
                <label>Exchange Rate ({oc} → UGX)</label>
                <div className="pfx"><span className="pfx-lbl">1 {oc} =</span><input type="number" step=".001" value={form.exchangeRate} onChange={e=>set('exchangeRate',e.target.value)} placeholder="0"/></div>
                <div className="rate-hint">Default: 1 {oc} ≈ {DEF[form.originCountry]} UGX</div>
              </div>
              <div className="field">
                <label>Total Purchase Price (UGX)</label>
                <div className="pfx"><span className="pfx-lbl">UGX</span><input readOnly value={buyUGX>0?fmt(buyUGX):''} placeholder="Auto-calculated" className="auto-in"/></div>
                <span className="tag">= {fmt(numBags)} bags × {oc} {fmtD(ppBag)} × rate</span>
              </div>
            </div>
          </div>
          <div className="card no-print">
            <h2>📋 Receipt Info</h2>
            <div className="field-row">
              <div className="field"><label>Your Name</label><input value={form.yourName} onChange={e=>set('yourName',e.target.value)} placeholder="Prepared by"/></div>
              <div className="field"><label>Boss / Recipient Name</label><input value={form.bossName} onChange={e=>set('bossName',e.target.value)} placeholder="Submitted to"/></div>
            </div>
            <div className="field-row full">
              <div className="field"><label>Vehicle / Truck Number Plate</label><input value={form.vehicleNo} onChange={e=>set('vehicleNo',e.target.value)} placeholder="e.g. UAX 123Z"/></div>
            </div>
          </div>
          <div className="btn-row no-print">
            <button className="btn btn-dk" onClick={()=>s1ok&&setExpStep(2)} style={{opacity:s1ok?1:.4}}>Next: Add Costs →</button>
          </div>
        </div>
      )}

      {expStep===2&&(
        <div>
          <div className="card">
            <h2>💰 Border &amp; Transport Costs</h2>
            <p style={{fontSize:'.78rem',color:'#7a6e5f',marginBottom:'1.1rem'}}>Select currency you were charged in — amounts convert to UGX automatically.</p>
            <CostField label="Border Tax (Customs Duty + Clearing Agent Fees)" hint="Combined total paid at the border"
              value={form.borderTax} onChange={v=>set('borderTax',v)} cur={form.borderTaxCur} onCur={v=>set('borderTaxCur',v)} oc={oc} rate={rate}/>
            <CostField label="Truck Hire / Transport Cost" hint="Total cost to hire the truck for this trip"
              value={form.truckHire} onChange={v=>set('truckHire',v)} cur={form.truckHireCur} onCur={v=>set('truckHireCur',v)} oc={oc} rate={rate}/>
            <CostField label="Other Costs (optional)" hint="Loading, offloading, market fees, etc."
              value={form.otherCosts} onChange={v=>set('otherCosts',v)} cur={form.otherCostsCur} onCur={v=>set('otherCostsCur',v)} oc={oc} rate={rate}/>
          </div>
          {totalExpenses>0&&(
            <div>
              <div className="total-box">
                <h3>Total Expenses</h3>
                <div className="total-num">UGX {fmt(totalExpenses)}</div>
                <hr style={{border:'none',borderTop:'1px solid rgba(255,255,255,.12)',margin:'.8rem 0'}}/>
                <div className="brow"><span className="bl">Purchase Price (converted)</span><span className="bv">UGX {fmt(buyUGX)}</span></div>
                <div className="brow"><span className="bl">Border Tax{form.borderTaxCur!=='UGX'?` (${form.borderTaxCur} ${fmt(parseFloat(form.borderTax)||0)})`:''}</span><span className="bv">UGX {fmt(btUGX)}</span></div>
                <div className="brow"><span className="bl">Truck Hire{form.truckHireCur!=='UGX'?` (${form.truckHireCur} ${fmt(parseFloat(form.truckHire)||0)})`:''}</span><span className="bv">UGX {fmt(thUGX)}</span></div>
                {parseFloat(form.otherCosts)>0&&<div className="brow"><span className="bl">Other Costs</span><span className="bv">UGX {fmt(ocUGX)}</span></div>}
              </div>
              {numBags>0&&(
                <div style={{marginBottom:'1rem'}}>
                  <div className="cpc"><span className="cl">Cost per bag (all-in)</span><span className="cv">UGX {fmt(cpb)}</span></div>
                  {totalKg>0&&<div className="cpc"><span className="cl">Cost per kg (all-in)</span><span className="cv">UGX {fmt(cpkg)}</span></div>}
                </div>
              )}
            </div>
          )}
          <div className="btn-row no-print">
            <button className="btn btn-lt" onClick={()=>setExpStep(1)}>← Back</button>
            <button className="btn btn-dk" onClick={()=>s2ok&&setExpStep(3)} style={{opacity:s2ok?1:.4}}>Generate Receipt →</button>
          </div>
        </div>
      )}

      {expStep===3&&(
        <div>
          <div className="btn-row no-print" style={{marginBottom:'1.1rem'}}>
            <button className="btn btn-lt" onClick={()=>setExpStep(2)}>← Edit</button>
            <button className="btn btn-dk" onClick={()=>window.print()}>🖨 Print</button>
            <button className="btn btn-gd" onClick={doPDF}>⬇ PDF</button>
            <button className="btn btn-wa" onClick={doWA}>💬 WhatsApp</button>
            {!expSaved
              ?<button className="btn btn-sv" onClick={doSaveTrip}>💾 Save Trip</button>
              :<button className="btn btn-lt" onClick={doNew} style={{color:'#2d6a2d',borderColor:'#2d6a2d'}}>+ New Trip</button>
            }
          </div>
          <div className="rcpt">
            <div className="rcpt-hd">
              <div className="brand">IMPORT EXPENSE RECEIPT</div>
              <div className="sub">UGANDA CROSS-BORDER TRADE — {form.originCountry.toUpperCase()} ROUTE</div>
            </div>
            <div className="rcpt-meta">
              <div className="rmi"><div className="k">Receipt No.</div><div className="v">{rno}</div></div>
              <div className="rmi"><div className="k">Date</div><div className="v">{todayDisplay}</div></div>
              <div className="rmi"><div className="k">Prepared by</div><div className="v">{form.yourName||'—'}</div></div>
              <div className="rmi"><div className="k">Submitted to</div><div className="v">{form.bossName||'—'}</div></div>
              <div className="rmi"><div className="k">Vehicle No.</div><div className="v">{form.vehicleNo||'—'}</div></div>
              <div className="rmi"><div className="k">Origin</div><div className="v">{form.originCountry}</div></div>
              <div className="rmi"><div className="k">Commodity</div><div className="v">{form.commodity}</div></div>
              <div className="rmi"><div className="k">No. of Bags</div><div className="v">{fmt(numBags)} bags</div></div>
              {kgPerBag>0&&<div className="rmi"><div className="k">Weight/Bag</div><div className="v">{fmt(kgPerBag)} kg</div></div>}
              {totalKg>0&&<div className="rmi"><div className="k">Total Weight</div><div className="v">{fmt(totalKg)} kg ({fmtD(totalT)} t)</div></div>}
              <div className="rmi"><div className="k">Price/Bag ({oc})</div><div className="v">{oc} {fmtD(ppBag)}</div></div>
              <div className="rmi"><div className="k">Exchange Rate</div><div className="v">1 {oc} = {fmtD(rate)} UGX</div></div>
            </div>
            <div className="rcpt-body">
              <table>
                <thead><tr><th style={{width:'55%'}}>Description</th><th className="rt">Amount (UGX)</th><th className="rt">Notes</th></tr></thead>
                <tbody>
                  <tr><td>Purchase Price ({fmt(numBags)} bags × {oc} {fmtD(ppBag)}/bag)</td><td className="mn rt">{fmt(buyUGX)}</td><td style={{textAlign:'right',fontSize:'.7rem',color:'#7a6e5f'}}>Forex</td></tr>
                  <tr><td>Border Tax — Customs + Clearing Agent{form.borderTaxCur!=='UGX'?` (${form.borderTaxCur} ${fmtD(parseFloat(form.borderTax)||0)})`:''}</td><td className="mn rt">{fmt(btUGX)}</td><td style={{textAlign:'right',fontSize:'.7rem',color:'#7a6e5f'}}>Border</td></tr>
                  <tr><td>Truck Hire / Transport{form.truckHireCur!=='UGX'?` (${form.truckHireCur} ${fmtD(parseFloat(form.truckHire)||0)})`:''}</td><td className="mn rt">{fmt(thUGX)}</td><td style={{textAlign:'right',fontSize:'.7rem',color:'#7a6e5f'}}>Full trip</td></tr>
                  {parseFloat(form.otherCosts)>0&&<tr><td>Other Costs</td><td className="mn rt">{fmt(ocUGX)}</td><td style={{textAlign:'right',fontSize:'.7rem',color:'#7a6e5f'}}>Misc.</td></tr>}
                  {numBags>0&&<tr style={{background:'#f5f9f0'}}><td style={{color:'#2d6a2d',fontWeight:600}}>All-in cost per bag</td><td className="mn rt" style={{color:'#2d6a2d',fontWeight:600}}>{fmt(cpb)}</td><td style={{textAlign:'right',fontSize:'.7rem',color:'#7a6e5f'}}>per bag</td></tr>}
                  {totalKg>0&&<tr style={{background:'#f5f9f0'}}><td style={{color:'#2d6a2d',fontWeight:600}}>All-in cost per kg</td><td className="mn rt" style={{color:'#2d6a2d',fontWeight:600}}>{fmt(cpkg)}</td><td style={{textAlign:'right',fontSize:'.7rem',color:'#7a6e5f'}}>per kg</td></tr>}
                </tbody>
              </table>
            </div>
            <div className="rcpt-tot">
              <span className="tl">TOTAL BUSINESS EXPENSES</span>
              <span className="tv">UGX {fmt(totalExpenses)}</span>
            </div>
            <div className="rcpt-ft">
              <div>All amounts in Uganda Shillings (UGX) · Generated: {todayDisplay}</div>
              <div className="stamp">PREPARED</div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ── App Root ── */
function App(){
  const [tab,setTab]=useState('expenses');
  const [expStep,setExpStep]=useState(1);
  const [form,setForm]=useState(BLANK);
  const [trips,setTrips]=useState(loadT);
  const [showHist,setShowHist]=useState(false);
  const [expSaved,setExpSaved]=useState(false);

  // Sales state
  const [entryDate,setEntryDate]=useState(todayStr);
  const [startPrice,setStartPrice]=useState(270000);
  const [priceDrop,setPriceDrop]=useState(10000);
  const [days,setDays]=useState([blankDay(),blankDay(),blankDay()]);

  const set=(k,v)=>setForm(f=>({...f,[k]:v}));
  const isTZ=form.originCountry==='Tanzania';
  const oc=CUR[form.originCountry];
  const rate=parseFloat(form.exchangeRate)||DEF[form.originCountry];
  const numBags=parseFloat(form.numBags)||0;
  const kgPerBag=parseFloat(form.kgPerBag)||0;
  const totalKg=numBags*kgPerBag;
  const totalT=totalKg/1000;
  const ppkDirect=parseFloat(form.pricePerBagDirect)||0;
  const ppkKg=parseFloat(form.pricePerKg)||0;
  const ppBag=ppkDirect>0?ppkDirect:(!isTZ&&ppkKg>0&&kgPerBag>0?ppkKg*kgPerBag:0);
  const buyUGX=ppBag*numBags*rate;
  const btUGX=toUGX(form.borderTax,form.borderTaxCur,oc,rate);
  const thUGX=toUGX(form.truckHire,form.truckHireCur,oc,rate);
  const ocUGX=toUGX(form.otherCosts,form.otherCostsCur,oc,rate);
  const totalExpenses=buyUGX+btUGX+thUGX+ocUGX;
  const cpb=numBags>0?totalExpenses/numBags:0;
  const cpkg=totalKg>0?totalExpenses/totalKg:0;
  const s1ok=form.originCountry&&form.commodity&&form.numBags&&(ppkDirect>0||(!isTZ&&ppkKg>0&&kgPerBag>0));
  const s2ok=form.borderTax&&form.truckHire;
  const changeCountry=v=>setForm(f=>({...f,originCountry:v,exchangeRate:DEF[v],truckHireCur:CUR[v],borderTaxCur:'UGX',otherCostsCur:'UGX',pricePerKg:'',pricePerBagDirect:'',kgPerBag:''}));

  // Sales computed
  function suggestedPrice(dayIdx){return Math.max(0,startPrice-dayIdx*priceDrop);}
  function dayDiscStats(d){return(d.discount||[]).reduce((s,l)=>({bags:s.bags+(l.bags||0),rev:s.rev+(l.bags||0)*(l.price||0)}),{bags:0,rev:0});}
  function dayTotal(d){return(d.marketBags||0)+dayDiscStats(d).bags;}
  function dayRev(d,i){const p=d.priceOverride!==null?d.priceOverride:suggestedPrice(i);return(d.marketBags||0)*p+dayDiscStats(d).rev;}
  const totalRevenue=days.reduce((s,d,i)=>s+dayRev(d,i),0);
  const totalSold=days.reduce((s,d)=>s+dayTotal(d),0);
  const netProfit=totalRevenue-totalExpenses;
  const roi=totalExpenses>0?(netProfit/totalExpenses)*100:0;
  const avgSalePrice=totalSold>0?totalRevenue/totalSold:0;

  function updateDay(idx,fn){
    setDays(prev=>{const next=[...prev];next[idx]=fn({...next[idx],discount:[...(next[idx].discount||[])]});return next;});
  }
  function addDay(){setDays(prev=>[...prev,blankDay()]);}

  function getDayDate(dayIdx){
    if(!entryDate) return null;
    const [y,m,d]=entryDate.split('-').map(Number);
    const dt=new Date(y,m-1,d);dt.setDate(dt.getDate()+dayIdx);return dt;
  }
  function fmtDate(d){if(!d)return'—';return d.toLocaleDateString('en-UG',{day:'numeric',month:'short'});}

  const doSaveTrip=()=>{
    const t={id:Date.now(),date:todayDisplay,originCountry:form.originCountry,commodity:form.commodity,numBags,kgPerBag,vehicleNo:form.vehicleNo,bossName:form.bossName,yourName:form.yourName,totalUGX:totalExpenses,costPerBag:cpb,form:{...form}};
    const upd=[...trips,t];setTrips(upd);saveT(upd);setExpSaved(true);
  };
  const doLoad=t=>{setForm(t.form);setExpSaved(true);setExpStep(3);};
  const doDel=id=>{const upd=trips.filter(x=>x.id!==id);setTrips(upd);saveT(upd);};
  const doNew=()=>{setForm(BLANK);setExpSaved(false);setExpStep(1);};

  const profitBadge=totalRevenue>0||totalExpenses>0?`${netProfit>=0?'+':''}${fmt(netProfit)}`:'';
  const profitBadgeClass=netProfit>0?'tab-badge-green':netProfit<0?'tab-badge-red':'';

  return(
    <div>
      <div className="app-header no-print">
        <div className="app-header-left">
          <div className="logo">UG</div>
          <div><h1>Onion Trade Manager</h1><p>Expenses · Sales · Profit — Uganda Cross-Border Trade</p></div>
        </div>
        <button className="hist-btn" onClick={()=>setShowHist(true)}>
          Trip History {trips.length>0&&<span className="hist-badge">{trips.length}</span>}
        </button>
      </div>

      {showHist&&<HistPanel trips={trips} onClose={()=>setShowHist(false)} onLoad={doLoad} onDel={doDel}/>}

      <div className="main-tabs no-print">
        <button className={`main-tab ${tab==='expenses'?'active':''}`} onClick={()=>setTab('expenses')}>
          <span className="tab-icon">📦</span> Expenses
          {totalExpenses>0&&<span className="tab-badge">UGX {fmt(totalExpenses)}</span>}
        </button>
        <button className={`main-tab ${tab==='sales'?'active':''}`} onClick={()=>setTab('sales')}>
          <span className="tab-icon">📈</span> Sales
          {totalRevenue>0&&<span className="tab-badge">UGX {fmt(totalRevenue)}</span>}
        </button>
        <button className={`main-tab ${tab==='profit'?'active':''}`} onClick={()=>setTab('profit')}>
          <span className="tab-icon">💰</span> Profit
          {profitBadge&&<span className={`tab-badge ${profitBadgeClass}`}>UGX {profitBadge}</span>}
        </button>
      </div>

      <div className="container">
        {tab==='expenses'&&(
          <ExpensesTab form={form} set={set} isTZ={isTZ} oc={oc} rate={rate}
            numBags={numBags} kgPerBag={kgPerBag} totalKg={totalKg} totalT={totalT}
            ppkDirect={ppkDirect} ppkKg={ppkKg} ppBag={ppBag} buyUGX={buyUGX}
            btUGX={btUGX} thUGX={thUGX} ocUGX={ocUGX} totalExpenses={totalExpenses}
            cpb={cpb} cpkg={cpkg} s1ok={s1ok} s2ok={s2ok} expStep={expStep}
            setExpStep={setExpStep} changeCountry={changeCountry} expSaved={expSaved}
            doSaveTrip={doSaveTrip} doNew={doNew}/>
        )}
        {tab==='sales'&&(
          <SalesTab entryDate={entryDate} setEntryDate={setEntryDate}
            startPrice={startPrice} setStartPrice={setStartPrice}
            priceDrop={priceDrop} setPriceDrop={setPriceDrop}
            numBagsFromExp={numBags} days={days} updateDay={updateDay} addDay={addDay}
            suggestedPrice={suggestedPrice} getDayDate={getDayDate} fmtDate={fmtDate}
            totalRevenue={totalRevenue} totalSold={totalSold}/>
        )}
        {tab==='profit'&&(
          <ProfitTab totalExpenses={totalExpenses} totalRevenue={totalRevenue}
            netProfit={netProfit} roi={roi} cpb={cpb} avgSalePrice={avgSalePrice}
            numBags={numBags} totalSold={totalSold} form={form}/>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
